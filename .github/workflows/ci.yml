name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - run: rustup component add rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            deps: >-
              libgl-dev
              libx11-dev
              libxcursor-dev
              libxrandr-dev
              libxinerama-dev
              libxi-dev
              libasound2-dev
          - os: windows-latest
            deps: ""
          - os: macos-latest
            deps: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}
      - run: rustup component add clippy
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            deps: >-
              libgl-dev
              libx11-dev
              libxcursor-dev
              libxrandr-dev
              libxinerama-dev
              libxi-dev
              libasound2-dev
          - os: windows-latest
            deps: ""
          - os: macos-latest
            deps: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test
